{% load i18n %}
<div class="card h-100 shadow-sm">
  <div class="card-body">
    {% if widget.title %}<h6 class="card-title text-muted small mb-3">{{ widget.title }}</h6>{% endif %}
    {% if widget.data.labels %}
    <canvas id="{{ widget.canvas_id }}" style="max-height:280px"></canvas>
    <script>
    (function(){
      const d = JSON.parse('{{ widget.data_json|escapejs }}');
      new Chart(document.getElementById('{{ widget.canvas_id }}'), {
        type: 'bar',
        data: {labels: d.labels, datasets: [{data: d.values, backgroundColor: d.colors}]},
        options: {indexAxis:'y', responsive:true, plugins:{legend:{display:false}},
                  scales:{x:{beginAtZero:true}}}
      });
    })();
    </script>
    {% else %}
    <p class="text-muted small mb-0">{% trans "Aucune donnée." %}</p>
    {% endif %}
  </div>
</div>
