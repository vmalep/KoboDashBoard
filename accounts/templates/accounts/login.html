<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connexion — KoboToolBox Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>body { background: #f5f5f5; } .login-card { max-width: 420px; margin: 10vh auto 0; }</style>
</head>
<body>
  <div class="login-card px-3">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h5 mb-1 text-center fw-bold">KoboToolBox Dashboard</h1>
        <p class="text-center text-muted small mb-4">AMOPAH3 — Do Not Harm</p>

        {% if form.errors %}
          <div class="alert alert-danger py-2 small">
            Email ou mot de passe incorrect.
          </div>
        {% endif %}

        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label for="id_username" class="form-label">Adresse email</label>
            <input type="email" name="username" id="id_username"
                   class="form-control" autofocus required autocomplete="email">
          </div>
          <div class="mb-3">
            <label for="id_password" class="form-label">Mot de passe</label>
            <input type="password" name="password" id="id_password"
                   class="form-control" required autocomplete="current-password">
          </div>
          <input type="hidden" name="next" value="{{ next }}">
          <button type="submit" class="btn btn-danger w-100">Se connecter</button>
        </form>

        <hr class="my-3">
        <p class="text-center small mb-0">
          Pas encore de compte ?
          <a href="/accounts/register/">Demander un accès</a>
        </p>
      </div>
    </div>
  </div>
</body>
</html>
