<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Réinitialiser le mot de passe — KoboToolBox Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>body { background: #f5f5f5; } .login-card { max-width: 420px; margin: 10vh auto 0; }</style>
</head>
<body>
  <div class="login-card px-3">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h5 mb-1 text-center fw-bold">KoboToolBox Dashboard</h1>
        <p class="text-center text-muted small mb-4">Réinitialisation du mot de passe</p>

        <p class="small text-muted mb-3">
          Entrez votre adresse email. Si un compte existe, vous recevrez un lien de réinitialisation.
        </p>

        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label for="id_email" class="form-label">Adresse email</label>
            <input type="email" name="email" id="id_email"
                   class="form-control" autofocus required autocomplete="email">
          </div>
          <button type="submit" class="btn btn-danger w-100">Envoyer le lien</button>
        </form>

        <hr class="my-3">
        <p class="text-center small mb-0">
          <a href="/accounts/login/">Retour à la connexion</a>
        </p>
      </div>
    </div>
  </div>
</body>
</html>
